  <script>
    // ========== HELPERS ==========
    function getClassesTipo(tipo) {
      const tiposMap = {
        'urgente': 'aviso-urgente badge-danger',
        'informativo': 'aviso-informativo badge-info',
        'evento': 'aviso-evento badge-success',
        'default': 'aviso-informativo badge-secondary'
      };
      return tiposMap[tipo] || tiposMap.default;
    }

    function nomeadoBadgeTipo(tipo) {
      const tiposNome = {
        'urgente': 'Urgente',
        'informativo': 'Informativo',
        'evento': 'Evento'
      };
      return tiposNome[tipo] || 'Aviso';
    }

    function formatarData(data) {
      if (!data) return '-';
      const dt = new Date(data);
      return dt.toLocaleDateString('pt-AO', { 
        day: '2-digit', 
        month: 'short', 
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      }) + ', ' + dt.toLocaleTimeString('pt-AO', { 
        hour: '2-digit', 
        minute: '2-digit' 
      });
    }

    function showFlashMessage(message, type = 'success') {
      const existingFlash = document.querySelector('.alert');
      if (existingFlash) {
        existingFlash.remove();
      }
      const flash = document.createElement('div');
      flash.className = `alert alert-${type} alert-dismissible fade show`;
      flash.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      `;
      const pageContent = document.getElementById('pageContent');
      if (pageContent.firstChild) {
        pageContent.insertBefore(flash, pageContent.firstChild);
      } else {
        pageContent.prepend(flash);
      }
      setTimeout(() => {
        if (flash.parentNode) {
          flash.remove();
        }
      }, 5000);
    }

    // ========== CARREGAMENTO INICIAL ==========
    async function carregarDados() {
      const spinner = document.getElementById('loadingSpinner');
      const content = document.getElementById('pageContent');
      
      try {
        console.log('%c[AVISOS] Iniciando carregamento...', 'color: blue; font-weight: bold;');
        
        // Carregar dados do professor
        const usuarioId = localStorage.getItem('userId');
        const professor = await api.getProfessorByUsuario(usuarioId);
        
        console.log('%c[AVISOS] Professor carregado:', 'color: green;', professor);
        
        // Atualizar header
        const headerName = document.querySelector('.header-user-name');
        const headerAvatar = document.querySelector('.header-user-avatar');
        
        headerName.textContent = professor.nome_prof || 'Professor';
        headerAvatar.textContent = professor.nome_prof
          ? professor.nome_prof.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2)
          : 'JF';
        
        // Carregar avisos
        const avisos = await api.getAvisos();
        
        console.log('%c[AVISOS] Avisos carregados:', 'color: green;', avisos);
        
        if (!avisos || avisos.length === 0) {
          const avisosList = document.getElementById('avisosList');
          avisosList.innerHTML = '<div class="alert alert-info">Nenhum aviso disponível.</div>';
          spinner.style.display = 'none';
          content.style.display = 'block';
          return;
        }
        
        // Popular avisos
        renderizarAvisos(avisos);
        
        // Preencher tipos únicos no dropdown
        const tiposUnicos = [...new Set(avisos.map(a => a.tipo || 'informativo'))];
        const filtroTipo = document.getElementById('filtroTipo');
        tiposUnicos.forEach(tipo => {
          const option = document.createElement('option');
          option.value = tipo;
          option.textContent = nomeadoBadgeTipo(tipo);
          filtroTipo.appendChild(option);
        });
        
        // Setup event listeners
        setupEventListeners();
        
        spinner.style.display = 'none';
        content.style.display = 'block';
        
        console.log('%c[AVISOS] Carregamento concluído!', 'color: green; font-weight: bold;');
        
      } catch (erro) {
        console.error('%c[AVISOS] Erro ao carregar:', 'color: red;', erro);
        spinner.innerHTML = `<div class="alert alert-danger">Erro ao carregar avisos: ${erro.message}</div>`;
      }
    }

    // ========== RENDERIZAR AVISOS ==========
    function renderizarAvisos(avisos) {
      const avisosList = document.getElementById('avisosList');
      avisosList.innerHTML = '';
      
      avisos.forEach(aviso => {
        const tipo = aviso.tipo || 'informativo';
        const status = 'nao_lido'; // Assumindo que vem da API
        const classes = getClassesTipo(tipo);
        const nomeStatus = status === 'nao_lido' ? 'Não Lido' : 'Lido';
        const badgeStatus = status === 'nao_lido' ? 'badge-warning' : 'badge-secondary';
        
        const avisoCard = document.createElement('div');
        avisoCard.className = `aviso-card ${classes} aviso-${status}`;
        avisoCard.dataset.tipo = tipo;
        avisoCard.dataset.status = status;
        avisoCard.dataset.id = aviso.id_aviso;
        
        const badgesClasses = classes.split(' ');
        const badgeColor = badgesClasses[1] || 'badge-secondary';
        
        avisoCard.innerHTML = `
          <div class="aviso-header">
            <div class="aviso-badges">
              <span class="badge ${badgeColor}">${nomeadoBadgeTipo(tipo)}</span>
              <span class="badge ${badgeStatus}">${nomeStatus}</span>
            </div>
            <span class="aviso-data">${formatarData(aviso.data_aviso || aviso.createdAt)}</span>
          </div>
          <h5 class="aviso-titulo">${aviso.titulo_aviso || aviso.titulo || 'Sem título'}</h5>
          <p class="aviso-texto">${aviso.conteudo_aviso || aviso.conteudo || 'Sem conteúdo'}</p>
          <div class="aviso-footer">
            <span class="aviso-autor">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              ${aviso.autor_aviso || 'Sistema'}
            </span>
            <button class="btn btn-sm btn-outline-primary btn-marcar-lido" data-id="${aviso.id_aviso}">Marcar como Lido</button>
          </div>
        `;
        
        avisosList.appendChild(avisoCard);
      });
    }

    // ========== FILTRAR AVISOS ==========
    function filtrarAvisos() {
      const tipoSelecionado = document.getElementById('filtroTipo').value;
      const statusSelecionado = document.getElementById('filtroStatus').value;
      const termoBusca = document.getElementById('buscaAviso').value.toLowerCase().trim();
      const avisos = document.querySelectorAll('.aviso-card');

      avisos.forEach(aviso => {
        const tipo = aviso.dataset.tipo;
        const status = aviso.dataset.status;
        const titulo = aviso.querySelector('.aviso-titulo').textContent.toLowerCase();
        const texto = aviso.querySelector('.aviso-texto').textContent.toLowerCase();

        const matchTipo = !tipoSelecionado || tipo === tipoSelecionado;
        const matchStatus = !statusSelecionado || status === statusSelecionado;
        const matchBusca = !termoBusca || titulo.includes(termoBusca) || texto.includes(termoBusca);

        if (matchTipo && matchStatus && matchBusca) {
          aviso.style.display = 'block';
        } else {
          aviso.style.display = 'none';
        }
      });
    }

    // ========== MARCAR COMO LIDO ==========
    async function marcarComoLido(avisoId) {
      const aviso = document.querySelector(`[data-id="${avisoId}"]`);
      if (!aviso) return;

      try {
        console.log('%c[AVISOS] Marcando aviso como lido:', 'color: blue;', avisoId);
        
        // Atualizar UI imediatamente
        aviso.dataset.status = 'lido';
        aviso.classList.remove('aviso-nao-lido');

        const badgesContainer = aviso.querySelector('.aviso-badges');
        const badgeNaoLido = badgesContainer.querySelector('.badge-warning');
        
        if (badgeNaoLido) {
          badgeNaoLido.textContent = 'Lido';
          badgeNaoLido.className = 'badge badge-secondary';
        }

        const footer = aviso.querySelector('.aviso-footer');
        const btnMarcarLido = footer.querySelector('.btn-marcar-lido');
        if (btnMarcarLido) {
          btnMarcarLido.remove();
        }

        const dataLeitura = document.createElement('span');
        dataLeitura.className = 'text-muted small';
        dataLeitura.textContent = `Lido em ${new Date().toLocaleDateString('pt-AO')}`;
        footer.appendChild(dataLeitura);

        atualizarContadorNaoLidos();
        showFlashMessage('Aviso marcado como lido!');
        
        console.log('%c[AVISOS] Aviso marcado com sucesso!', 'color: green;');
        
      } catch (erro) {
        console.error('%c[AVISOS] Erro ao marcar lido:', 'color: red;', erro);
        showFlashMessage(`Erro ao marcar aviso: ${erro.message}`, 'danger');
      }
    }

    // ========== ATUALIZAR CONTADOR ==========
    function atualizarContadorNaoLidos() {
      const naoLidos = document.querySelectorAll('.aviso-card[data-status="nao_lido"]').length;
      const badge = document.querySelector('.nav-badge');
      if (badge) {
        badge.textContent = naoLidos;
        if (naoLidos === 0) {
          badge.style.display = 'none';
        } else {
          badge.style.display = 'inline';
        }
      }
    }

    // ========== SETUP EVENT LISTENERS ==========
    function setupEventListeners() {
      const btnFiltrar = document.getElementById('btnFiltrar');
      const buscaAviso = document.getElementById('buscaAviso');
      const filtroTipo = document.getElementById('filtroTipo');
      const filtroStatus = document.getElementById('filtroStatus');

      if (btnFiltrar) {
        btnFiltrar.addEventListener('click', filtrarAvisos);
      }
      if (buscaAviso) {
        buscaAviso.addEventListener('input', filtrarAvisos);
      }
      if (filtroTipo) {
        filtroTipo.addEventListener('change', filtrarAvisos);
      }
      if (filtroStatus) {
        filtroStatus.addEventListener('change', filtrarAvisos);
      }

      document.addEventListener('click', function (e) {
        if (e.target.classList.contains('btn-marcar-lido')) {
          const avisoId = e.target.dataset.id;
          marcarComoLido(avisoId);
        }
      });

      atualizarContadorNaoLidos();
    }

    // ========== INICIALIZAÇÃO ==========
    document.addEventListener('DOMContentLoaded', carregarDados);
  </script>
