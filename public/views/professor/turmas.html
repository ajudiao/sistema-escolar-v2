  <script>
    const cores = [
      { bg: 'rgba(59, 130, 246, 0.1)', color: '#3b82f6', badge: 'bg-info' },
      { bg: 'rgba(16, 185, 129, 0.1)', color: '#10b981', badge: 'bg-success' },
      { bg: 'rgba(245, 158, 11, 0.1)', color: '#f59e0b', badge: 'bg-warning' },
      { bg: 'rgba(139, 92, 246, 0.1)', color: '#8b5cf6', badge: 'bg-purple' },
    ];

    async function carregarTurmas() {
      try {
        const usuarioId = localStorage.getItem('userId');
        
        if (!usuarioId) {
          console.error('Usuário não identificado');
          document.getElementById('loadingSpinner').style.display = 'none';
          return;
        }

        // Obter professor
        const professor = await api.getProfessorByUsuario(usuarioId);
        
        // Atualizar nome do professor no header
        document.querySelector('.header-user-name').textContent = professor.nome_prof;
        document.querySelector('.header-user-avatar').textContent = 
          professor.nome_prof.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

        // Carregar turmas do professor
        const turmas = await api.getTurmasProfessor(professor.id_prof);

        // Renderizar turmas
        renderizarTurmas(turmas);

        // Esconder spinner e mostrar turmas
        document.getElementById('loadingSpinner').style.display = 'none';
        document.getElementById('turmasContainer').style.display = '';

      } catch (error) {
        console.error('Erro ao carregar turmas:', error);
        document.getElementById('loadingSpinner').innerHTML = `
          <div class="alert alert-danger mt-3">
            <strong>Erro ao carregar turmas!</strong>
            <p>${error.message}</p>
          </div>
        `;
      }
    }

    function renderizarTurmas(turmas) {
      const container = document.getElementById('turmasContainer');
      container.innerHTML = '';

      turmas.forEach((turma, index) => {
        const cor = cores[index % cores.length];
        const totalAlunos = turma._count?.estudantes || 0;

        const col = document.createElement('div');
        col.className = 'col-md-6 col-lg-4';
        col.innerHTML = `
          <div class="card turma-card">
            <div class="turma-card-header">
              <div class="turma-icon" style="background: ${cor.bg}; color: ${cor.color};">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              </div>
              <div style="flex: 1;">
                <h5 class="turma-title">${turma.sigla_turma}</h5>
                <p class="turma-discipline">${turma.classe_turma}ª Classe</p>
              </div>
              <span class="badge ${cor.badge}" style="height: fit-content;">${turma.turno_turma}</span>
            </div>
            <div class="turma-stats">
              <div class="turma-stat">
                <span class="turma-stat-value">${totalAlunos}</span>
                <span class="turma-stat-label">Alunos</span>
              </div>
              <div class="turma-stat">
                <span class="turma-stat-value">${turma.curso?.sigla_curso || 'N/A'}</span>
                <span class="turma-stat-label">Curso</span>
              </div>
              <div class="turma-stat">
                <span class="turma-stat-value">${turma.sala_turma || 'N/A'}</span>
                <span class="turma-stat-label">Sala</span>
              </div>
            </div>
            <div class="turma-actions">
              <a href="faltas.html?turma=${turma.id_turma}" class="btn btn-sm btn-outline-secondary">Faltas</a>
              <a href="turma-detalhes.html?id=${turma.id_turma}" class="btn btn-sm btn-primary">Ver Detalhes</a>
            </div>
          </div>
        `;

        container.appendChild(col);
      });
    }

    document.addEventListener('DOMContentLoaded', carregarTurmas);
  </script>
