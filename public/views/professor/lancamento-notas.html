  <script>
    document.addEventListener('DOMContentLoaded', function () {
      let avaliacoes = [
        { id: 1, titulo: 'Teste 1º Trimestre', data: '2026-03-15', duracao: 90, disciplina: 'matematica', turma: '10A', status: 'pendente' },
        { id: 2, titulo: 'Prova Física', data: '2026-04-10', duracao: 120, disciplina: 'fisica', turma: '10B', status: 'lançadas' }
      ];

      function showFlashMessage(message, type = 'success') {
        const flash = document.getElementById('flashMessage');
        flash.textContent = message;
        flash.className = `alert alert-${type}`;
        flash.style.display = 'block';
        setTimeout(() => {
          flash.style.display = 'none';
        }, 5000);
      }

      function renderSelectAvaliacoesPendentes() {
        const select = document.getElementById('selectAvaliacaoLancar');
        select.innerHTML = '<option value="">Selecione...</option>';
        avaliacoes.filter(av => av.status === 'pendente').forEach(av => {
          const option = document.createElement('option');
          option.value = av.id;
          option.textContent = `${av.titulo} - ${av.turma}`;
          select.appendChild(option);
        });
      }

      function getAlunosMock(turma) {
        const alunosPorTurma = {
          '10A': ['Ana Pereira', 'Pedro Santos', 'João Costa'],
          '10B': ['Maria Silva', 'Luís Gomes', 'Rita Alves'],
          '11A': ['Carlos Mendes', 'Sofia Ribeiro', 'Miguel Sousa']
        };
        return alunosPorTurma[turma] || [];
      }

      // Carregar Alunos para Lançar Notas
      document.getElementById('btnCarregarAlunos').addEventListener('click', function () {
        const avId = document.getElementById('selectAvaliacaoLancar').value;
        if (!avId) {
          showFlashMessage('Selecione uma avaliação.', 'warning');
          return;
        }
        const avaliacao = avaliacoes.find(av => av.id == avId);
        const alunos = getAlunosMock(avaliacao.turma);
        const tbody = document.getElementById('tabelaAlunosNotas');
        tbody.innerHTML = '';
        alunos.forEach(aluno => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${aluno}</td>
            <td><input type="number" class="form-control nota-input" min="0" max="20" placeholder="0-20"></td>
          `;
          tbody.appendChild(tr);
        });
        document.getElementById('divLancarNotas').style.display = 'block';
      });

      // Lançar Notas
      document.getElementById('btnLancarNotas').addEventListener('click', function () {
        const avId = document.getElementById('selectAvaliacaoLancar').value;
        const notas = Array.from(document.querySelectorAll('.nota-input')).map(inp => parseFloat(inp.value) || 0);
        const avaliacao = avaliacoes.find(av => av.id == avId);

        // Simulação API
        setTimeout(() => {
          console.log('Lançando notas para avaliação:', avaliacao, 'Notas:', notas);
          avaliacao.status = 'lançadas';
          renderSelectAvaliacoesPendentes();
          showFlashMessage('Notas lançadas com sucesso!');
          document.getElementById('divLancarNotas').style.display = 'none';
          document.getElementById('selectAvaliacaoLancar').value = '';
        }, 1000);
      });

      // Inicializar
      renderSelectAvaliacoesPendentes();
    });
  </script>
