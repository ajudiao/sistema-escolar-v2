        <div class="spinner-border text-primary" role="status" style="width: 2rem; height: 2rem;">
          <span class="visually-hidden">Carregando...</span>
        </div>
        <p class="text-muted mt-2">Carregando avisos...</p>
      </div>

      <!-- Page Content (hidden while loading) -->
      <div id="pageContent" style="display: none;">
        <!-- Filters -->
        <div class="card mb-4">
          <div class="card-body">
            <div class="row g-3 align-items-end">
              <div class="col-md-3">
                <label class="form-label">Prioridade</label>
                <select class="form-control form-select" id="filtroPrioridade">
                  <option value="">Todas as prioridades</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">Status</label>
                <select class="form-control form-select" id="filtroStatus">
                  <option value="">Todos</option>
                  <option value="nao_lido">Não lidos</option>
                  <option value="lido">Lidos</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Pesquisar</label>
                <input type="text" class="form-control" id="buscaAviso" placeholder="Buscar aviso...">
              </div>
              <div class="col-md-2">
                <button class="btn btn-primary w-100" id="btnFiltrar">Filtrar</button>
              </div>
            </div>
          </div>
        </div>
